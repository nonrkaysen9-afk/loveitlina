<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ура! 🎉</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #fff0f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Слой с эффектом размытия */
    .blur-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
      transition: opacity 0.6s ease-out, visibility 0.6s;
    }

    .blur-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .big-click-text {
      font-size: 3rem;
      font-weight: bold;
      color: #ff4d6d;
      text-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .small-hint {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #888;
    }

    /* Кот на фоне */
    .cat-background {
      position: fixed;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: auto;
      z-index: 1;
      pointer-events: none;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
    }

    .cat-background img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Контент по центру */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      max-width: 450px;
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(255, 77, 109, 0.2);
      text-align: center;
    }

    .content h1 {
      color: #ff4d6d;
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    .content p.main-message {
      color: #555;
      font-size: 1.1rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .content .tg-hint {
      font-size: 0.9rem;
      color: #888;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <!-- Блюр с призывом к действию -->
  <div class="blur-overlay" id="blur">
    <span class="big-click-text">ТЫК</span>
    <span class="small-hint">Нажми, чтобы увидеть всё</span>
  </div>

  <!-- Кот на фоне -->
  <div class="cat-background">
    <img src="cat.gif" alt="кот" onerror="this.style.display='none'; alert('Не найден файл cat.gif! Проверь название и регистр букв.');">
  </div>

  <!-- Контент по центру -->
  <div class="content">
    <h1>Ура! 🎉</h1>
    <p class="main-message">Спасибо, что выбрала «Да», я тебя лублу 👉👈❤</p>
    <p class="tg-hint">Напиши свой ответ мне в Telegram</p>
  </div>

  <!-- Музыка -->
  <audio id="music" loop>
    <source src="hapi-hapi-hapi.mp3" type="audio/mpeg">
  </audio>

  <script>
    const blur = document.getElementById('blur');
    const audio = document.getElementById('music');
    let isPlaying = false;

    document.addEventListener('click', () => {
      if (!isPlaying) {
        audio.play().then(() => {
          isPlaying = true;
          blur.classList.add('hidden');
        }).catch(e => {
          console.error('Ошибка автовоспроизведения:', e);
          blur.classList.add('hidden');
        });
      }
    });
  </script>
</body>
</html>
