<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loveitbombom21</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #fff0f5 0%, #ffffff 100%);
      color: #333;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 500px;
      width: 90%;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(255, 77, 109, 0.15);
      position: relative;
      z-index: 10;
    }

    h1 {
      color: #ff4d6d;
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    p {
      color: #555;
      line-height: 1.6;
      font-size: 1rem;
    }

    .buttons {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 20px;
      position: relative;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      position: relative;
      z-index: 5;
    }

    #btn-yes {
      background-color: #ff4d6d;
      color: white;
    }
    #btn-yes:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
    }

    #btn-no {
      background-color: #e0e0e0;
      color: #333;
      position: relative;
    }

    #btn-no.moving {
      transition: none;
    }

    .hint-text {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>❤️</h1>
    <p>Лина, я вспомнил, как тебя зовут. Ты красивая, милая девушка. Мне нравится с тобой общаться, дружить. Твой голос — шедевр, ты лучшая! И я хочу сказать: ты мне нравишься. Хочу спросить: будешь со мной встречаться?</p>
    
    <div class="buttons">
      <button id="btn-yes">Да, я согласна</button>
      <button id="btn-no">Нет</button>
    </div>

    <p class="hint-text">Напиши мне в личные сообщения, какой выбор ты сделала</p>
  </div>

  <script>
    const btnYes = document.getElementById('btn-yes');
    const btnNo = document.getElementById('btn-no');

    btnYes.addEventListener('click', () => {
      window.location.href = 'yes.html';
    });

    btnNo.addEventListener('mouseenter', () => {
      const container = document.querySelector('.buttons');
      const btnRect = btnNo.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();

      const maxX = containerRect.width - btnRect.width;
      const maxY = containerRect.height - btnRect.height;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      btnNo.style.left = randomX + 'px';
      btnNo.style.top = randomY + 'px';
      btnNo.classList.add('moving');
    });

    btnNo.addEventListener('click', (e) => {
      e.preventDefault();
      alert('Ну ладно… я не буду настаивать 😔');
    });
  </script>
</body>
</html>
